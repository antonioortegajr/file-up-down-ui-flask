<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1419">
  <title>Duplicates</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1419;
      --bg-elevated: #1a2332;
      --bg-input: #243044;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --text-muted: #8b9aad;
      --accent: #5b9fd4;
      --accent-hover: #7eb6e8;
      --radius: 12px;
      --tap-min: 44px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      padding:
        max(1rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(1.25rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
    }
    .wrap { width: 100%; max-width: 28rem; margin: 0 auto; }
    nav {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) - 4px);
      overflow: hidden;
    }
    nav a {
      flex: 1;
      text-align: center;
      padding: 0.65rem 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      background: var(--bg-input);
    }
    nav a.is-active {
      color: var(--text);
      background: var(--bg-elevated);
      box-shadow: inset 0 -2px 0 0 var(--accent);
    }
    nav a + a { border-left: 1px solid var(--border); }
    nav a:hover:not(.is-active) { color: var(--text); }
    h1 {
      font-size: clamp(1.35rem, 4vw, 1.6rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .lede {
      margin: 0 0 1.25rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .btn {
      min-height: var(--tap-min);
      padding: 0 1.1rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: calc(var(--radius) - 4px);
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      color: var(--text);
      background: var(--bg-input);
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger {
      color: #fff;
      background: #c94e4e;
    }
    .btn-danger:hover { background: #e06666; }
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .progress-bar {
      height: 8px;
      background: var(--bg-input);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.75rem;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }
    .status-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
    }
    .empty-state p { margin: 0; }
    .group {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .group-header {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .photos {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .photo {
      flex: 1 1 calc(50% - 0.375rem);
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .photo img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: calc(var(--radius) - 4px);
      background: var(--bg-input);
    }
    .photo .filename {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      text-align: center;
      word-break: break-all;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .photo .actions {
      margin-top: 0.35rem;
    }
    .photo .actions button {
      font-size: 0.75rem;
      padding: 0.35rem 0.65rem;
    }
    .summary {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a href="/">Library</a>
      <a href="/albums">Albums</a>
      <a href="/people">People</a>
      <a href="/duplicates" class="is-active">Duplicates</a>
    </nav>

    <h1>Duplicates</h1>
    <p class="lede">Find and remove near-identical photos.</p>

    <div class="card" id="scan-card">
      <button class="btn" id="scan-btn" onclick="startScan()">Scan for Duplicates</button>
      <div id="progress-section" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
        </div>
        <p class="status-text" id="status-text">Scanning...</p>
      </div>
    </div>

    <div id="results-section">
      <p class="summary" id="summary"></p>
      <div id="groups"></div>
      <div class="empty-state" id="empty-state" style="display: none;">
        <p>No duplicates found</p>
      </div>
    </div>
  </div>

  <script>
    let currentJobId = null;
    let duplicateGroups = [];

    async function startScan() {
      const scanBtn = document.getElementById('scan-btn');
      const progressSection = document.getElementById('progress-section');
      const progressFill = document.getElementById('progress-fill');
      const statusText = document.getElementById('status-text');

      scanBtn.disabled = true;
      scanBtn.textContent = 'Scanning...';
      progressSection.style.display = 'block';
      progressFill.style.width = '0%';
      statusText.textContent = 'Starting scan...';

      try {
        const resp = await fetch('/api/scan-duplicates', { method: 'POST' });
        const data = await resp.json();
        currentJobId = data.job_id;

        const eventSource = new EventSource('/api/scan-duplicates/' + currentJobId);

        eventSource.onmessage = function(e) {
          const update = JSON.parse(e.data);
          progressFill.style.width = update.progress + '%';
          statusText.textContent = update.message || 'Scanning...';

          if (update.result !== undefined && update.result !== null) {
            duplicateGroups = update.result;
            showResults(duplicateGroups);
            scanBtn.disabled = false;
            scanBtn.textContent = 'Scan for Duplicates';
            eventSource.close();
          }

          if (update.error) {
            statusText.textContent = 'Error: ' + update.error;
            scanBtn.disabled = false;
            scanBtn.textContent = 'Scan for Duplicates';
            eventSource.close();
          }
        };

        eventSource.onerror = function() {
          eventSource.close();
          scanBtn.disabled = false;
          scanBtn.textContent = 'Scan for Duplicates';
        };
      } catch (err) {
        statusText.textContent = 'Error: ' + err.message;
        scanBtn.disabled = false;
        scanBtn.textContent = 'Scan for Duplicates';
      }
    }

    function showResults(groups) {
      const summary = document.getElementById('summary');
      const groupsDiv = document.getElementById('groups');
      const emptyState = document.getElementById('empty-state');

      groupsDiv.innerHTML = '';

      if (!groups || groups.length === 0) {
        summary.textContent = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      summary.textContent = groups.length + ' duplicate group' + (groups.length === 1 ? '' : 's') + ' found';

      groups.forEach((group, idx) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'group';

        const header = document.createElement('p');
        header.className = 'group-header';
        header.textContent = 'Group ' + (idx + 1) + ' (' + group.length + ' photos)';
        groupDiv.appendChild(header);

        const photosDiv = document.createElement('div');
        photosDiv.className = 'photos';

        group.forEach((filename, photoIdx) => {
          const photoDiv = document.createElement('div');
          photoDiv.className = 'photo';

          const img = document.createElement('img');
          img.src = '/uploads/' + encodeURIComponent(filename);
          img.alt = filename;
          photoDiv.appendChild(img);

          const nameSpan = document.createElement('p');
          nameSpan.className = 'filename';
          nameSpan.textContent = filename;
          photoDiv.appendChild(nameSpan);

          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'actions';

          const isLast = (photoIdx === group.length - 1);
          if (!isLast) {
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn btn-danger';
            deleteBtn.textContent = 'Delete';
            deleteBtn.onclick = () => deletePhoto(filename, group);
            actionsDiv.appendChild(deleteBtn);
          }
          photoDiv.appendChild(actionsDiv);
          photosDiv.appendChild(photoDiv);
        });

        groupDiv.appendChild(photosDiv);
        groupsDiv.appendChild(groupDiv);
      });
    }

    async function deletePhoto(filename, group) {
      if (!confirm('Delete ' + filename + '?')) {
        return;
      }

      const formData = new FormData();
      formData.append('filename', filename);
      formData.append('view', 'thumb');

      try {
        const resp = await fetch('/delete', {
          method: 'POST',
          body: formData
        });

        if (resp.ok) {
          const idx = group.indexOf(filename);
          if (idx > -1) {
            group.splice(idx, 1);
          }

          const globalIdx = duplicateGroups.findIndex(g => g.includes(filename));
          if (globalIdx > -1) {
            const g = duplicateGroups[globalIdx];
            const pIdx = g.indexOf(filename);
            if (pIdx > -1) {
              g.splice(pIdx, 1);
            }

            if (g.length <= 1) {
              duplicateGroups.splice(globalIdx, 1);
            }
          }

          showResults(duplicateGroups);
        }
      } catch (err) {
        alert('Error deleting: ' + err.message);
      }
    }
  </script>
</body>
</html>
